<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PETER EDEL Schild-Generator</title>
<link rel="stylesheet" href="assets/styles/stylesheet.css">
<link rel="stylesheet" href="assets/styles/sign-types.css">
</head>
<body>
<div class="app">
  <header>
    <a href="../index.html" class="header-back-link">← Zurück zum Toolset</a>
    <div class="accent-dot"></div>
    <h1>Schild-Generator</h1>
  </header>
  <aside>
    <div>
      <div class="section-label">CI-Schema</div>
      <div class="schema-switcher">
        <button class="schema-btn active" onclick="setSchema('pe',this)">
          <div class="swatch swatch-pe"></div>PE
        </button>
        <button class="schema-btn" onclick="setSchema('kbw',this)">
          <div class="swatch swatch-kbw"></div>kbw.
        </button>
      </div>
    </div>
    <div>
      <div class="section-label">Format</div>
      <div class="format-grid">
        <button class="format-btn active" onclick="setFormat('A6',this)"><div class="fmt-icon fmt-icon-a6"></div>A6</button>
        <button class="format-btn" onclick="setFormat('A5',this)"><div class="fmt-icon fmt-icon-a5"></div>A5</button>
        <button class="format-btn" onclick="setFormat('A4',this)"><div class="fmt-icon fmt-icon-a4"></div>A4</button>
        <button class="format-btn" onclick="setFormat('A3',this)"><div class="fmt-icon fmt-icon-a3"></div>A3</button>
      </div>
    </div>
    <div>
      <div class="section-label">Ausrichtung</div>
      <div class="orient-toggle">
        <button class="orient-btn active" onclick="setOrient('portrait',this)">
          <div class="orient-icon orient-icon-portrait"></div>Hoch
        </button>
        <button class="orient-btn" onclick="setOrient('landscape',this)">
          <div class="orient-icon orient-icon-landscape"></div>Quer
        </button>
      </div>
    </div>
    <div>
      <div class="section-label">Inhalt</div>
      <div class="mode-toggle">
        <button class="mode-btn active" onclick="setMode('headline',this)">Nur Titel</button>
        <button class="mode-btn" onclick="setMode('full',this)">Titel + Text</button>
      </div>
    </div>
    <div class="field">
      <label>Haupttext</label>
      <input type="text" id="headline" placeholder="z.B. Willkommen!" oninput="updateText()">
    </div>
    <div class="field" id="bodyField" style="display:none;">
      <label>Subtext</label>
      <textarea id="bodytext" rows="4" placeholder="Weiterer Text..." oninput="updateText()"></textarea>
    </div>
    <div id="imgSection">
      <div class="section-label">Bild</div>
      <div class="img-controls" id="imgControls">
        <label class="img-drop" id="imgDrop" onclick="document.getElementById('imgFileInput').click()">
          <input type="file" id="imgFileInput" accept="image/*" onchange="loadUserImg(event)">
          Bild auswählen oder hier ablegen
        </label>
        <div class="img-options" id="imgOptions">
          <div class="img-pos-toggle">
            <button class="img-pos-btn active" onclick="setImgPos('top',this)">Oben</button>
            <button class="img-pos-btn" onclick="setImgPos('bottom',this)">Unten</button>
          </div>
          <button class="btn btn-secondary btn-sm" onclick="removeUserImg()">Bild entfernen</button>
        </div>
      </div>
    </div>
    <div class="actions">
      <button class="btn btn-primary" id="btnPrint" onclick="doPrint()">↓ Als PDF speichern</button>
    </div>
  </aside>
  <main id="mainArea">
    <div class="poster-wrap" id="posterWrap">
      <div class="poster schema-pe" id="poster">
        <div class="poster-frame">
          <!-- Echte DOM-Elemente statt ::before/::after,
               weil html2canvas Pseudo-Elemente nicht zuverlässig rendert -->
          <div class="poster-frame-seg poster-frame-seg-left" id="frameSegLeft"></div>
          <div class="poster-frame-seg poster-frame-seg-right" id="frameSegRight"></div>
        </div>
        <div class="poster-content">
          <img class="poster-user-img" id="posterUserImg" alt="">
          <div class="poster-headline" id="posterHeadline">Haupttext</div>
          <div class="poster-bodytext" id="posterBodytext"></div>
        </div>
        <div class="poster-logo-wrap">
          <div class="poster-logo-bg">
            <img class="poster-logo" id="posterLogo" alt="Logo" src="../assets/logos/PE_Logo_v2_blau.svg">
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const LOGOS = { pe: '../assets/logos/PE_Logo_v2_blau.svg', kbw: '../assets/logos/kbw_logo_brombeere.svg' };
const FORMATS = {
  A6: { w: 298, h: 420 }, A5: { w: 420, h: 595 },
  A4: { w: 595, h: 842 }, A3: { w: 842, h: 1191 }
};
const state = { schema: 'pe', format: 'A6', orient: 'portrait', mode: 'headline' };
const BORDER_WIDTHS = {
  pe:  { A6: 1, A5: 1.5, A4: 2,   A3: 3 },
  kbw: { A6: 1, A5: 1.25, A4: 1.5, A3: 2 }
};

function clearActive(sel) { document.querySelectorAll(sel).forEach(b => b.classList.remove('active')); }

function getDims() {
  const f = FORMATS[state.format];
  return state.orient === 'portrait' ? { w: f.w, h: f.h } : { w: f.h, h: f.w };
}

function applyAll() {
  const { w, h } = getDims();
  const main = document.getElementById('mainArea');
  const avW = main.clientWidth - 64, avH = main.clientHeight - 64;
  const scale = Math.min(avW / w, avH / h, 1);
  const poster = document.getElementById('poster');
  const wrap   = document.getElementById('posterWrap');
  poster.style.width  = w + 'px';
  poster.style.height = h + 'px';
  wrap.style.width    = w + 'px';
  wrap.style.height   = h + 'px';
  wrap.style.transform = 'scale(' + scale + ')';

  const margin = Math.round(w * 0.04);
  const ms = margin + 'px';
  const frame = poster.querySelector('.poster-frame');
  const content = poster.querySelector('.poster-content');
  [frame, content].forEach(el => {
    el.style.top = ms; el.style.left = ms; el.style.right = ms; el.style.bottom = ms;
  });
  poster.querySelector('.poster-logo-wrap').style.bottom = ms;

  const bw = BORDER_WIDTHS[state.schema][state.format] + 'px';
  frame.style.setProperty('--frame-bw', bw);
  frame.style.borderTop    = bw + ' solid currentColor';
  frame.style.borderLeft   = bw + ' solid currentColor';
  frame.style.borderRight  = bw + ' solid currentColor';
  frame.style.borderBottom = state.schema === 'pe' ? 'none' : bw + ' solid currentColor';

  const r = Math.round(w * 0.12) + 'px';
  frame.style.borderRadius = state.schema === 'kbw' ? r + ' 0 ' + r + ' 0' : '0';

  // PE-Schema: untere Liniensegmente als echte DOM-Elemente
  const segLeft  = document.getElementById('frameSegLeft');
  const segRight = document.getElementById('frameSegRight');
  if (state.schema === 'pe') {
    segLeft.style.display  = 'block';
    segRight.style.display = 'block';
    segLeft.style.height   = bw;
    segRight.style.height  = bw;
    // Segmentbreite: vom Rand bis kurz vor das Logo
    const logoBg = poster.querySelector('.poster-logo-bg');
    const frameW = w - 2 * margin;
    const logoW = logoBg.offsetWidth > 0 ? logoBg.offsetWidth : Math.round(Math.min(w * 0.07, 52) * 3.5) + 32;
    const segW = Math.max(12, (frameW - logoW) / 2 - 8);
    segLeft.style.width  = Math.round(segW) + 'px';
    segRight.style.width = Math.round(segW) + 'px';
  } else {
    segLeft.style.display  = 'none';
    segRight.style.display = 'none';
  }

  const logoH = Math.min(w * 0.07, 52) * (state.schema === 'kbw' ? 0.6 : 1);
  document.getElementById('posterLogo').style.height = logoH + 'px';
  document.getElementById('posterHeadline').style.fontSize = Math.round(w * 0.07) + 'px';
  document.getElementById('posterBodytext').style.fontSize  = Math.round(w * 0.036) + 'px';

  const userImg = document.getElementById('posterUserImg');
  if (userImg.style.display !== 'none') {
    const imgMaxH = state.orient === 'portrait' ? h * 0.175 : h * 0.35;
    userImg.style.maxHeight = Math.round(imgMaxH) + 'px';
  }
}

function setSchema(s, btn) {
  state.schema = s;
  clearActive('.schema-btn'); btn.classList.add('active');
  document.getElementById('poster').className = 'poster schema-' + s;
  document.getElementById('posterLogo').src = LOGOS[s];
  applyAll();
}
function setFormat(f, btn) {
  state.format = f; clearActive('.format-btn'); btn.classList.add('active'); applyAll();
}
function setOrient(o, btn) {
  state.orient = o; clearActive('.orient-btn'); btn.classList.add('active'); applyAll();
}
function setMode(m, btn) {
  state.mode = m; clearActive('.mode-btn'); btn.classList.add('active');
  const show = m === 'full';
  document.getElementById('bodyField').style.display    = show ? 'flex'  : 'none';
  document.getElementById('posterBodytext').style.display = show ? 'block' : 'none';
}
function updateText() {
  document.getElementById('posterHeadline').textContent = document.getElementById('headline').value  || 'Ihre Ueberschrift';
  document.getElementById('posterBodytext').textContent  = document.getElementById('bodytext').value  || '';
}
const imgState = { pos: 'top' };

function loadUserImg(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = document.getElementById('posterUserImg');
    img.src = e.target.result;
    img.style.display = 'block';
    document.getElementById('imgOptions').style.display = 'flex';
    document.getElementById('imgDrop').textContent = file.name;
    applyImgPos();
    applyAll();
  };
  reader.readAsDataURL(file);
}

function setImgPos(pos, btn) {
  imgState.pos = pos;
  document.querySelectorAll('.img-pos-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyImgPos();
}

function applyImgPos() {
  const content = document.querySelector('.poster-content');
  const img = document.getElementById('posterUserImg');
  if (img.style.display === 'none') return;
  if (imgState.pos === 'top') {
    content.insertBefore(img, content.firstChild);
  } else {
    content.appendChild(img);
  }
}

function removeUserImg() {
  const img = document.getElementById('posterUserImg');
  img.src = '';
  img.style.display = 'none';
  document.getElementById('imgOptions').style.display = 'none';
  const drop = document.getElementById('imgDrop');
  drop.innerHTML = '<input type="file" id="imgFileInput" accept="image/*" onchange="loadUserImg(event)">Bild auswählen oder hier ablegen';
  applyAll();
}

// ── PRINT LAYOUT ──
// Für Kleinformate (A6, A5) werden mehrere Schilder auf ein A4-Blatt
// gelegt. Dabei werden die Schilder so zentriert, dass der Abstand
// zu allen Schneidkanten (Papierrand UND Mittellinie) gleich ist.
//
// Layout-Logik:
// A6 portrait  : 2×2 upright   auf A4 portrait
// A6 landscape : 2×2 rotated   auf A4 portrait
// A5 portrait  : 1×2 rotated   auf A4 portrait
// A5 landscape : 1×2 upright   auf A4 portrait
// A4/A3        : 1×1 direkt

function getPrintLayout() {
  const f = state.format, o = state.orient;
  if (f === 'A6') return { cols: 2, rows: 2, paperW: 210, paperH: 297, rotate: o === 'landscape' };
  if (f === 'A5') return { cols: 1, rows: 2, paperW: 210, paperH: 297, rotate: o === 'portrait' };
  if (f === 'A4') return { cols: 1, rows: 1, paperW: 210, paperH: 297, rotate: o === 'landscape' };
  /* A3 */        return { cols: 1, rows: 1, paperW: 297, paperH: 420, rotate: o === 'landscape' };
}

function buildPrintGrid(layout) {
  const { w, h } = getDims();

  // Zell-Maße in mm
  const cellW_mm = layout.paperW / layout.cols;
  const cellH_mm = layout.paperH / layout.rows;

  // Poster-Maße in mm (aus 72dpi-Pixel umrechnen)
  const posterW_mm = (state.orient === 'portrait' ? FORMATS[state.format].w : FORMATS[state.format].h) * 25.4 / 72;
  const posterH_mm = (state.orient === 'portrait' ? FORMATS[state.format].h : FORMATS[state.format].w) * 25.4 / 72;

  // Skalierung: Poster soll in die Zelle passen mit gleichmäßigem Rand
  // Bei Rotation: die Breite des Posters muss in die Zellbreite passen
  const fitW = layout.rotate ? posterH_mm : posterW_mm;
  const fitH = layout.rotate ? posterW_mm : posterH_mm;
  const scaleFactor = Math.min(cellW_mm / fitW, cellH_mm / fitH);

  // Skalierte Poster-Maße in mm (nach Rotation betrachtet)
  const scaledW = fitW * scaleFactor;
  const scaledH = fitH * scaleFactor;

  // Zentrierung: gleicher Abstand auf allen Seiten
  const offsetX_mm = (cellW_mm - scaledW) / 2;
  const offsetY_mm = (cellH_mm - scaledH) / 2;

  // In Pixel umrechnen (96dpi für CSS)
  const px = v => v * 96 / 25.4;
  const cellW_px = px(cellW_mm);
  const cellH_px = px(cellH_mm);

  // Scale from poster pixel dimensions to target pixel size
  const scale = layout.rotate ? px(scaledW) / h : px(scaledW) / w;

  const grid = document.createElement('div');
  grid.id = '_printGrid';
  grid.style.width               = layout.paperW + 'mm';
  grid.style.height              = layout.paperH + 'mm';
  grid.style.display             = 'grid';
  grid.style.gridTemplateColumns = 'repeat(' + layout.cols + ', ' + cellW_mm + 'mm)';
  grid.style.gridTemplateRows    = 'repeat(' + layout.rows + ', ' + cellH_mm + 'mm)';

  const poster = document.getElementById('poster');

  for (let i = 0; i < layout.cols * layout.rows; i++) {
    const clone = poster.cloneNode(true);
    clone.removeAttribute('id');
    clone.querySelectorAll('[id]').forEach(el => el.removeAttribute('id'));

    const cell = document.createElement('div');
    cell.style.cssText = 'width:' + cellW_mm + 'mm; height:' + cellH_mm + 'mm; overflow:hidden; position:relative;';

    // Scaler-Element: positioniert das Poster zentriert in der Zelle
    const scaler = document.createElement('div');
    const offX = Math.round(px(offsetX_mm));
    const offY = Math.round(px(offsetY_mm));

    if (layout.rotate) {
      // Bei Rotation (-90°) mit transform-origin 0 0:
      // Nach rotate(-90deg) wird das Element um seinen Ursprung gedreht,
      // dann muss top um die skalierte Breite (= scale * w) versetzt werden
      const topPx = Math.round(scale * w) + offY;
      scaler.style.cssText =
        'position:absolute; left:' + offX + 'px; top:' + topPx + 'px;' +
        'width:' + w + 'px; height:' + h + 'px;' +
        'transform-origin:0 0; transform:rotate(-90deg) scale(' + scale.toFixed(5) + ');';
    } else {
      scaler.style.cssText =
        'position:absolute; left:' + offX + 'px; top:' + offY + 'px;' +
        'width:' + w + 'px; height:' + h + 'px;' +
        'transform-origin:0 0; transform:scale(' + scale.toFixed(5) + ');';
    }

    scaler.appendChild(clone);
    cell.appendChild(scaler);
    grid.appendChild(cell);
  }
  return grid;
}

async function doPrint() {
  const layout = getPrintLayout();
  const { jsPDF } = window.jspdf;

  const grid = buildPrintGrid(layout);
  grid.style.cssText += '; position:fixed; left:-9999px; top:0; display:grid;';
  document.body.appendChild(grid);

  const btn = document.getElementById('btnPrint');
  if (btn) btn.disabled = true;

  try {
    const pxW = Math.round(layout.paperW * 96 / 25.4);
    const pxH = Math.round(layout.paperH * 96 / 25.4);

    const canvas = await html2canvas(grid, {
      scale: 2,
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#ffffff',
      width:  pxW,
      height: pxH,
      logging: false,
    });

    const imgData = canvas.toDataURL('image/jpeg', 0.95);

    const pdf = new jsPDF({
      orientation: layout.paperW > layout.paperH ? 'landscape' : 'portrait',
      unit: 'mm',
      format: [layout.paperW, layout.paperH],
      compress: true,
    });

    pdf.addImage(imgData, 'JPEG', 0, 0, layout.paperW, layout.paperH, '', 'FAST');
    pdf.save('Schild_' + state.schema.toUpperCase() + '_' + state.format + '_' + (state.orient === 'landscape' ? 'Q' : 'H') + '.pdf');

  } catch(err) {
    alert('PDF-Export fehlgeschlagen: ' + err.message);
  } finally {
    grid.remove();
    if (btn) btn.disabled = false;
  }
}

applyAll();
window.addEventListener('resize', applyAll);
document.getElementById('posterLogo').addEventListener('load', applyAll);
</script>
</body>
</html>
